<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QOIMA — Вход</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --panel: #15151a;
      --border: #20202a;
      --text: #e8e8ea;
      --text-dim: #6b6b76;
      --text-mid: #9c9ca8;
      --accent: #f59e0b;
      --accent-strong: rgba(245, 158, 11, 0.95);
      --red: #ef4444;
      --green: #22c55e;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 380px;
    }

    .logo {
      font-size: 32px; font-weight: 700; letter-spacing: 1px;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 8px;
    }
    .tagline {
      color: var(--text-dim);
      text-align: center;
      font-size: 13px;
      margin-bottom: 32px;
    }

    .auth-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 22px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 12px;
      border-radius: 7px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--panel);
      color: var(--text);
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--text-mid);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button.submit {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      font-family: inherit;
    }
    button.submit:hover { background: var(--accent-strong); }
    button.submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); display: block; }
    .msg.success { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.3); display: block; }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .footer-note {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="logo">QOIMA</div>
    <div class="tagline">Панель продавца Kaspi</div>

    <div class="auth-card">
      <div class="tabs">
        <div class="tab active" data-mode="login">Войти</div>
        <div class="tab" data-mode="register">Регистрация</div>
      </div>

      <!-- LOGIN -->
      <div class="form-section active" id="form-login">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        <label>Пароль</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        <button class="submit" onclick="doLogin()">Войти</button>
      </div>

      <!-- REGISTER -->
      <div class="form-section" id="form-register">
        <label>Имя</label>
        <input type="text" id="reg-name" placeholder="Жансая" autocomplete="name" />
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        <label>Пароль (мин. 6 символов)</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" />
        <button class="submit" onclick="doRegister()">Создать аккаунт</button>
      </div>

      <div class="msg" id="msg"></div>
    </div>

    <div class="footer-note">© QOIMA · работает на Vercel</div>
  </div>

  <script>
    // Если уже вошёл — сразу на дашборд
    (async function checkAlreadyLoggedIn() {
      try {
        const r = await fetch('/api/auth/me');
        if (r.ok) window.location.href = '/';
      } catch {}
    })();

    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        const mode = t.dataset.mode;
        document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
        document.querySelectorAll('.form-section').forEach(s => s.classList.toggle('active', s.id === 'form-' + mode));
        showMsg('');
      });
    });

    function showMsg(text, type) {
      const m = document.getElementById('msg');
      m.className = 'msg ' + (type || '');
      m.textContent = text;
      if (!text) m.style.display = 'none';
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showMsg('Заполни email и пароль', 'error'); return; }
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await r.json();
        if (!r.ok) { showMsg(data.error || 'Ошибка входа', 'error'); return; }
        window.location.href = '/';
      } catch (e) {
        showMsg('Сервер недоступен. Возможно, не настроена база данных.', 'error');
      }
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!email || !password) { showMsg('Заполни email и пароль', 'error'); return; }
      if (password.length < 6) { showMsg('Пароль слишком короткий (минимум 6 символов)', 'error'); return; }
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await r.json();
        if (!r.ok) { showMsg(data.error || 'Ошибка регистрации', 'error'); return; }
        window.location.href = '/';
      } catch (e) {
        showMsg('Сервер недоступен. Возможно, не настроена база данных.', 'error');
      }
    }
  </script>
</body>
</html>
