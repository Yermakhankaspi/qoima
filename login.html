<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QOIMA — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --panel: #15151a;
    --border: #20202a;
    --text: #e8e8ea;
    --text-dim: #9c9ca8;
    --accent: #f59e0b;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: radial-gradient(circle at 50% 30%, rgba(245, 158, 11, 0.08), transparent 60%), var(--bg);
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 13px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: var(--accent);
  }
  .btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--red);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 22px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="logo">QOIMA</div>
    <div class="subtitle">Панель продавца Kaspi</div>

    <div id="error" class="error" style="display: none;"></div>

    <div class="field">
      <label>Ваше имя</label>
      <input type="text" id="name" placeholder="Менеджер" autocomplete="username">
    </div>

    <div class="field">
      <label>Пароль доступа</label>
      <input type="password" id="password" placeholder="••••••" autocomplete="current-password" required autofocus>
    </div>

    <button type="submit" class="btn" id="submitBtn">Войти</button>

    <div class="hint">
      Пароль задаётся в Vercel<br>в переменной <code>ADMIN_PASSWORD</code>
    </div>
  </form>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value || 'Менеджер';

      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Вход…';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, name }),
        });
        const data = await r.json();
        if (!r.ok) {
          errorBox.textContent = data.error || 'Ошибка входа';
          errorBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Войти';
          return;
        }
        window.location.href = '/';
      } catch (err) {
        errorBox.textContent = 'Ошибка сети: ' + err.message;
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
