<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QOIMA — Панель продавца Kaspi</title><style>
*{box-sizing:border-box}body{margin:0;background:#08090c;color:#f7f8fb;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}.app{display:flex;height:100vh}.side{width:300px;background:#121318;border-right:1px solid #252731;display:flex;flex-direction:column}.brand{height:76px;padding:22px 18px;color:#f5a900;font-size:28px;font-weight:900;border-bottom:1px solid #252731}.nav{padding:16px 12px;overflow:auto;flex:1}.item,.sub{width:100%;border:0;border-radius:12px;background:transparent;color:#aeb4c5;padding:12px 14px;margin:3px 0;text-align:left;display:flex;justify-content:space-between;align-items:center;font-weight:650;cursor:pointer}.item.active,.sub.active{background:#3a2a10;color:#ffc247}.group{padding:18px 14px 8px;color:#d8dbe4;font-weight:800}.subs{border-left:1px solid #30333d;margin-left:20px;padding-left:11px}.badge{background:#343844;color:#d7dce9;border-radius:99px;min-width:25px;height:25px;padding:0 8px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}.gold{background:#f5a900;color:#16120a}.profile{border-top:1px solid #252731;padding:15px}.main{flex:1;display:flex;flex-direction:column}.top{height:76px;border-bottom:1px solid #252731;padding:14px 26px;display:flex;align-items:center;justify-content:space-between}.content{padding:34px;overflow:auto}h1{font-size:32px;margin:0 0 10px}.muted{color:#82899a}.tabs{display:flex;gap:13px;flex-wrap:wrap;margin:30px 0 18px;border-bottom:1px solid #252731;padding-bottom:18px}.tab{border:0;background:transparent;color:#808798;padding:10px 14px;border-radius:12px;font-size:16px;font-weight:750;cursor:pointer}.tab.active{background:#181a23;color:#fff}.filters{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:18px 0}.left{display:flex;gap:12px;flex-wrap:wrap}.inp,.sel,.btn{height:50px;background:#151720;border:1px solid #282c38;border-radius:12px;color:#f7f8fb;padding:0 16px;font-weight:650}.inp{width:440px}.btn{cursor:pointer}.btn.blue{color:#27aeea;border-color:#096896;background:#0a1420}table{width:100%;border-collapse:collapse}.box{background:#171820;border:1px solid #282c38;border-radius:18px;overflow:hidden}th{color:#82899a;font-size:13px;text-align:left;text-transform:uppercase;letter-spacing:.08em;background:#1b1c23;padding:17px}td{padding:18px 17px;border-top:1px solid #252731}.pill{padding:7px 13px;border-radius:99px;background:#4b3210;color:#ffbf39;font-weight:800;font-size:13px}.red{background:#4b2028;color:#ff7d82}.empty{text-align:center;color:#858b9e;padding:60px}.modal{display:none;position:fixed;inset:0;background:#0009;align-items:center;justify-content:center}.modal.open{display:flex}.card{width:min(650px,95vw);background:#171820;border:1px solid #30333d;border-radius:18px;padding:22px}.grid{display:grid;grid-template-columns:210px 1fr;gap:10px;margin-top:15px}.grid div:nth-child(odd){color:#8c93a5}@media(max-width:850px){.app{display:block;height:auto}.side{width:100%;height:auto}.main{min-height:100vh}.inp{width:100%}table{min-width:900px}.box{overflow:auto}}
</style></head><body><div class="app"><aside class="side"><div class="brand">QOIMA</div><div class="nav"><button class="item">✦ ИИ Консультант</button><button class="item">▦ Дашборд</button><button class="item active" onclick="setTab('all')"><span>▣ Заказы Каспи</span><span class="badge gold" id="c-all">0</span></button><div class="group">🚚 Kaspi Доставка</div><div class="subs"><button class="sub" data-tab="preorder" onclick="setTab('preorder')"><span>Предзаказ</span><span class="badge" id="c-preorder">0</span></button><button class="sub" data-tab="packing" onclick="setTab('packing')"><span>Упаковка</span><span class="badge gold" id="c-packing">0</span></button><button class="sub" data-tab="transfer" onclick="setTab('transfer')"><span>Передача</span><span class="badge" id="c-transfer">0</span></button><button class="sub" data-tab="transmitted" onclick="setTab('transmitted')"><span>Переданы на доставку</span><span class="badge gold" id="c-transmitted">0</span></button><button class="sub" data-tab="deliveryCancelled" onclick="setTab('deliveryCancelled')"><span>Отменены при доставке</span><span class="badge" id="c-deliveryCancelled">0</span></button></div><button class="item">↩ Возвраты</button><button class="item">⬡ Склад</button><button class="item">↗ Продажи</button><button class="item">⚙ Инструменты</button><button class="item">☼ Настройки</button></div><div class="profile"><b id="user">Yermakhan</b><div class="muted">Менеджер</div></div></aside><main class="main"><div class="top"><b>Заказы Каспи</b><div><select class="sel" id="days" onchange="load()"><option value="7">За 7 дней</option><option value="30" selected>За 30 дней</option><option value="90">За 90 дней</option><option value="180">За 180 дней</option></select> <button class="btn" onclick="load()">⟳ Обновить</button></div></div><section class="content"><h1>Заказы Каспи</h1><div class="muted">Данные берутся из Kaspi Partner API. Вкладки Kaspi Доставки считаются по status: ASSEMBLE/ARRIVED и courierTransmissionDate.</div><div class="tabs" id="tabs"></div><div class="filters"><div class="left"><input class="inp" id="q" oninput="render()" placeholder="⌕ Номер заказа или покупатель"><select class="sel" id="city" onchange="render()"><option value="">Все города</option></select></div><button class="btn blue" onclick="exportCsv()">⇩ Выгрузить в EXCEL</button></div><div class="box"><table><thead><tr><th>Код</th><th>Покупатель</th><th>Дата</th><th>Сумма</th><th>Статус</th><th>Доставка</th></tr></thead><tbody id="rows"><tr><td colspan="6" class="empty">загрузка…</td></tr></tbody></table></div></section></main></div><div class="modal" id="m" onclick="closeM(event)"><div class="card" onclick="event.stopPropagation()"><button class="btn" style="float:right" onclick="closeM()">×</button><h2 id="mt">Заказ</h2><div class="grid" id="mg"></div></div></div><script>
const tabs=[['new','Новые'],['delivery','Моя доставка'],['sign','На подписании'],['pickup','Самовывоз'],['preorder','Предзаказ'],['transmitted','Переданы на доставку'],['deliveryCancelled','Отменены при доставке'],['archive','Архив']];let tab='all',orders=[],shown=[];const statusRu={APPROVED_BY_BANK:'Нужно принять',ACCEPTED_BY_MERCHANT:'Принят',ASSEMBLE:'Передача',ARRIVED:'Передан/прибыл',COMPLETED:'Выдан',CANCELLED:'Отменен',CANCELLING:'В процессе отмены',RETURNED:'Возвращен',KASPI_DELIVERY_RETURN_REQUESTED:'Ожидает возврата'};const delRu={DELIVERY_PICKUP:'Самовывоз',DELIVERY_LOCAL:'Доставка',DELIVERY_REGIONAL_TODOOR:'Kaspi доставка',DELIVERY_REGIONAL_PICKUP:'Самовывоз'};
function buildTabs(){document.getElementById('tabs').innerHTML=tabs.map(([k,l])=>`<button class="tab ${k===tab?'active':''}" onclick="setTab('${k}')"><span>${l}</span> <span class="badge" id="tc-${k}">0</span></button>`).join('')}
async function init(){buildTabs();try{let r=await fetch('/api/auth/me');if(r.ok){let j=await r.json();document.getElementById('user').textContent=j.user?.name||'Yermakhan'}else location.href='/login.html'}catch{} load()}
function setTab(k){tab=k;document.querySelectorAll('.sub').forEach(x=>x.classList.toggle('active',x.dataset.tab===k));buildTabs();load()}
async function load(){document.getElementById('rows').innerHTML='<tr><td colspan="6" class="empty">загрузка…</td></tr>';let r=await fetch(`/api/orders?tab=${encodeURIComponent(tab)}&days=${document.getElementById('days').value}`,{credentials:'include'});let j=await r.json();if(!r.ok){document.getElementById('rows').innerHTML=`<tr><td colspan="6" class="empty">Ошибка: ${esc(j.error||r.status)}</td></tr>`;return}orders=j.data||[];setCounts(j.counts||{});fillCities();render()}
function setCounts(c){['all','new','delivery','sign','pickup','archive','preorder','packing','transfer','transmitted','deliveryCancelled'].forEach(k=>{let e=document.getElementById('c-'+k);if(e)e.textContent=c[k]||0;let t=document.getElementById('tc-'+k);if(t)t.textContent=c[k]||0})}
function fillCities(){let sel=document.getElementById('city'),old=sel.value;let cs=[...new Set(orders.map(o=>o.city).filter(Boolean))].sort();sel.innerHTML='<option value="">Все города</option>'+cs.map(c=>`<option>${esc(c)}</option>`).join('');if(cs.includes(old))sel.value=old}
function render(){let q=document.getElementById('q').value.toLowerCase().trim(), city=document.getElementById('city').value;shown=orders.filter(o=>(!q||String(o.code).includes(q)||String(o.buyer).toLowerCase().includes(q))&&(!city||o.city===city));document.getElementById('rows').innerHTML=shown.length?shown.map((o,i)=>`<tr onclick="openM(${i})"><td><b>${esc(o.code)}</b></td><td>${esc(o.buyer)}</td><td>${fmtDate(o.date)}</td><td>${fmtMoney(o.amount)}</td><td><span class="pill ${String(o.status).includes('CANCEL')?'red':''}">${esc(statusRu[o.status]||o.status||'—')}</span></td><td>${esc(delRu[o.delivery]||o.delivery||'—')}</td></tr>`).join(''):'<tr><td colspan="6" class="empty">По заданным критериям не найдено ни одного заказа</td></tr>'}
function openM(i){let o=shown[i];document.getElementById('mt').textContent='Заказ '+o.code;document.getElementById('mg').innerHTML=[['Код',o.code],['Покупатель',o.buyer],['State',o.state],['Status',o.status],['Категория QOIMA',o.category],['preOrder',o.preOrder],['План передачи',fmtDate(o.courierTransmissionPlanningDate)],['Факт передачи',fmtDate(o.courierTransmissionDate)],['returnedToWarehouse',o.returnedToWarehouse]].map(x=>`<div>${esc(x[0])}</div><div>${esc(x[1])}</div>`).join('');document.getElementById('m').classList.add('open')}
function closeM(e){if(!e||e.target.id==='m')document.getElementById('m').classList.remove('open')}
function exportCsv(){let rows=[['Код','Покупатель','Дата','Сумма','State','Status','Доставка','Категория'],...shown.map(o=>[o.code,o.buyer,fmtDate(o.date),o.amount,o.state,o.status,o.delivery,o.category])];let csv=rows.map(r=>r.map(c=>`"${String(c??'').replaceAll('"','""')}"`).join(';')).join('\n');let b=new Blob(['\ufeff'+csv],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='qoima-orders.csv';a.click();URL.revokeObjectURL(u)}
function fmtDate(v){if(!v)return '—';return new Intl.DateTimeFormat('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}).format(new Date(v)).replace(',','')}function fmtMoney(v){return new Intl.NumberFormat('ru-KZ').format(Number(v||0))+' ₸'}function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}init();
</script></body></html>
